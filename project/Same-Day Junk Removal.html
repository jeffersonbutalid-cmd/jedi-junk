<meta charset="UTF-8">

<title>Same-Day Junk Removal · JEDI Junk Removal</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* ===== Brand tokens (canonical) ===== */
:root {
  --jet-black: #0B0B0B;
  --jet-black-soft: #141414;
  --jedi-green: #1FBD1F;
  --jedi-green-deep: #149814;
  --hauler-yellow: #FFC319;
  --paper: #FFFFFF;
  --gray-50: #F4F5F4;
  --gray-100: #ECEDEC;
  --gray-200: #DEDFDE;
  --gray-300: #C8C9C8;
  --gray-500: #6B6D6B;
  --gray-700: #2A2C2A;
  --footer-gray: #1A1B1A;

  --font-display: 'Bebas Neue', 'Impact', sans-serif;
  --font-body: 'Montserrat', -apple-system, system-ui, sans-serif;

  --maxw: 1240px;
  --pad-x: clamp(20px, 5vw, 56px);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  color: var(--jet-black);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-size: 16px;
  line-height: 1.55;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; }

/* Display type */
.display {
  font-family: var(--font-display);
  letter-spacing: 0.01em;
  line-height: 0.92;
  text-transform: uppercase;
  font-weight: 400;
}
.eyebrow {
  font-family: var(--font-display);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Section padding helper */
.section { padding: clamp(56px, 9vw, 112px) var(--pad-x); }
.section-tight { padding: clamp(36px, 6vw, 64px) var(--pad-x); }
.wrap { max-width: var(--maxw); margin: 0 auto; }

/* CTA buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 18px 28px;
  border-radius: 999px;
  font-family: var(--font-body);
  font-weight: 900;
  font-size: 17px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
  white-space: nowrap;
  cursor: pointer;
  border: 2px solid transparent;
}
.btn:active { transform: translateY(1px) scale(0.99); }
.btn-primary {
  background: var(--jedi-green);
  color: var(--jet-black);
  box-shadow: 0 6px 0 0 var(--jedi-green-deep), 0 12px 24px rgba(31,189,31,0.25);
}
.btn-primary:hover {
  background: #25d325;
  box-shadow: 0 4px 0 0 var(--jedi-green-deep), 0 14px 28px rgba(31,189,31,0.35);
  transform: translateY(-1px);
}
.btn-ghost {
  background: transparent;
  color: var(--paper);
  border: 2px solid rgba(255,255,255,0.45);
}
.btn-ghost:hover { border-color: var(--paper); background: rgba(255,255,255,0.06); }
.btn-yellow {
  background: var(--hauler-yellow);
  color: var(--jet-black);
}

/* Pill chip */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--hauler-yellow);
  color: var(--jet-black);
  font-weight: 900;
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 9px 16px;
  border-radius: 999px;
}

/* Trust badges row */
.trust-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 22px;
  align-items: center;
  color: rgba(255,255,255,0.85);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.trust-row .star { color: var(--jedi-green); margin-right: 6px; }

/* Inputs */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-500);
}
.field input, .field textarea {
  background: var(--gray-50);
  border: 1.5px solid var(--gray-200);
  padding: 14px 16px;
  border-radius: 10px;
  font-size: 16px;
  color: var(--jet-black);
  outline: none;
  transition: border-color 0.12s ease, background 0.12s ease;
}
.field input:focus, .field textarea:focus {
  border-color: var(--jedi-green);
  background: var(--paper);
}
.field textarea { resize: vertical; min-height: 96px; font-family: inherit; }

/* Reduce motion */
@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

/* Bottom-bar safety spacer on mobile so content isn't covered */
.mobile-spacer { display: none; height: 76px; }
@media (max-width: 899px) {
  .mobile-spacer { display: block; }
}
</style>
</head>

<div id="root"></div>
